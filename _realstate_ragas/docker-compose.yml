
services:
  backend:
    build: .
    container_name: realstate-ragas-backend
    ports:
      - "8000:8000"
    volumes:
      - ./docs:/app/docs
      - ./logs:/app/logs
      - ./faiss_index:/app/faiss_index
      - ./.env:/app/.env
      - ./apikey.json:/app/apikey.json
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

