name: Backend CI CD

on:
  push:
    branches: [main]
    paths:
      - "apps/backend/**"
      - "shared/**"
      - ".github/workflows/backend-ci.yml"

  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SERVICE_NAME: miad-rag-backend
  IMAGE_NAME: miad-rag-backend

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Validate Dockerfile
        run: |
          test -s apps/backend/Dockerfile || (echo "Dockerfile is missing or empty" && exit 1)

      - name: Configure Docker auth
        run: |
          gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push backend image
        run: |
          IMAGE_URI="${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_ARTIFACT_REPO }}/${IMAGE_NAME}:${{ github.sha }}"
          docker build -t "$IMAGE_URI" apps/backend
          docker push "$IMAGE_URI"
          echo "IMAGE_URI=$IMAGE_URI" >> "$GITHUB_ENV"

      - name: Create or update backend Cloud Run service
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          if gcloud run services describe "$SERVICE_NAME" \
            --region "${{ vars.GCP_REGION }}" \
            --project "${{ vars.GCP_PROJECT_ID }}" >/dev/null 2>&1; then

            echo "Updating existing Cloud Run service: $SERVICE_NAME"
            gcloud run services update "$SERVICE_NAME" \
              --image "$IMAGE_URI" \
              --region "${{ vars.GCP_REGION }}" \
              --project "${{ vars.GCP_PROJECT_ID }}"
          else
            echo "Creating Cloud Run service: $SERVICE_NAME"
            gcloud run deploy "$SERVICE_NAME" \
              --image "$IMAGE_URI" \
              --region "${{ vars.GCP_REGION }}" \
              --project "${{ vars.GCP_PROJECT_ID }}" \
              --platform managed \
              --no-allow-unauthenticated \
              --port 8000
          fi