name: Indexer Job CI CD

on:
  push:
    branches: [main]
    paths:
      - "apps/job-indexer/**"
      - "shared/**"
      - ".github/workflows/job-ci.yml"

  workflow_dispatch:
    inputs:
      build_image:
        description: "Build and push Docker image"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

      deploy_job:
        description: "Update Cloud Run Job image"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

      execute_job:
        description: "Execute Cloud Run Job after deployment"
        required: true
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  JOB_NAME: miad-rag-indexer-job
  IMAGE_NAME: miad-rag-indexer-job

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Validate Dockerfile
        run: |
          test -s apps/job-indexer/Dockerfile || (echo "Dockerfile is missing or empty" && exit 1)

      - name: Configure Docker auth
        run: |
          gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev --quiet
      
      - name: Resolve image URI
        run: |
          IMAGE_BASE="${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_ARTIFACT_REPO }}/${IMAGE_NAME}"

          if [[ "${{ github.event_name }}" == "push" || "${{ inputs.build_image }}" == "true" ]]; then
            IMAGE_URI="${IMAGE_BASE}:${{ github.sha }}"
          else
            IMAGE_URI="${IMAGE_BASE}:latest"
          fi

          echo "IMAGE_BASE=$IMAGE_BASE" >> "$GITHUB_ENV"
          echo "IMAGE_URI=$IMAGE_URI" >> "$GITHUB_ENV"

          echo "IMAGE_BASE=$IMAGE_BASE"
          echo "IMAGE_URI=$IMAGE_URI"
        
      - name: Build and push indexer job image
        if: github.event_name == 'push' || inputs.build_image == 'true'
        run: |
          docker build \
            -f apps/job-indexer/Dockerfile \
            -t "$IMAGE_URI" \
            -t "${IMAGE_BASE}:latest" \
            .
          
          docker push "$IMAGE_URI"
          docker push "${IMAGE_BASE}:latest"

      - name: Update Cloud Run Job image
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || inputs.deploy_job == 'true')
        run: |
          if [ -z "${IMAGE_URI:-}" ]; then
            echo "IMAGE_URI is empty. Set build_image=true or ensure latest image exists."
            exit 1
          fi

          if ! gcloud run jobs describe "$JOB_NAME" \
            --region "${{ vars.GCP_REGION }}" \
            --project "${{ vars.GCP_PROJECT_ID }}" >/dev/null 2>&1; then

            echo "Cloud Run Job $JOB_NAME does not exist."
            echo "Create it with Terraform first. This workflow only updates the image."
            exit 1
          fi

          echo "Updating existing Cloud Run Job image: $JOB_NAME"
          echo "Image: $IMAGE_URI"

          gcloud run jobs update "$JOB_NAME" \
            --image "$IMAGE_URI" \
            --region "${{ vars.GCP_REGION }}" \
            --project "${{ vars.GCP_PROJECT_ID }}"

      - name: Execute Cloud Run Job
        if: github.ref == 'refs/heads/main' && github.event_name == 'workflow_dispatch' && inputs.execute_job == 'true'
        run: |
          gcloud run jobs execute "$JOB_NAME" \
            --region "${{ vars.GCP_REGION }}" \
            --project "${{ vars.GCP_PROJECT_ID }}" \
            --wait