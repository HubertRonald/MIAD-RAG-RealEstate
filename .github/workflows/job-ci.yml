name: Indexer Job CI CD

on:
  push:
    branches: [main]
    paths:
      - "apps/job-indexer/**"
      - "shared/**"
      - ".github/workflows/job-ci.yml"

  workflow_dispatch:
    inputs:
      execute_job:
        description: "Execute Cloud Run Job after deploy"
        required: true
        default: "false"

permissions:
  contents: read
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  JOB_NAME: miad-rag-indexer-job
  IMAGE_NAME: miad-rag-indexer-job

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Validate Dockerfile
        run: |
          test -s apps/job-indexer/Dockerfile || (echo "Dockerfile is missing or empty" && exit 1)

      - name: Configure Docker auth
        run: |
          gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push indexer job image
        run: |
          IMAGE_BASE="${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_ARTIFACT_REPO }}/${IMAGE_NAME}"
          IMAGE_URI="${IMAGE_BASE}:${{ github.sha }}"

          docker build -t "$IMAGE_URI" -t "${IMAGE_BASE}:latest" apps/job-indexer
          docker push "$IMAGE_URI"
          docker push "${IMAGE_BASE}:latest"

          echo "IMAGE_URI=$IMAGE_URI" >> "$GITHUB_ENV"

      - name: Create or update Cloud Run Job
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          if gcloud run jobs describe "$JOB_NAME" \
            --region "${{ vars.GCP_REGION }}" \
            --project "${{ vars.GCP_PROJECT_ID }}" >/dev/null 2>&1; then

            echo "Updating existing Cloud Run Job: $JOB_NAME"
            gcloud run jobs update "$JOB_NAME" \
              --image "$IMAGE_URI" \
              --region "${{ vars.GCP_REGION }}" \
              --project "${{ vars.GCP_PROJECT_ID }}"
          else
            echo "Creating Cloud Run Job: $JOB_NAME"
            gcloud run jobs create "$JOB_NAME" \
              --image "$IMAGE_URI" \
              --region "${{ vars.GCP_REGION }}" \
              --project "${{ vars.GCP_PROJECT_ID }}"
          fi

      - name: Execute Cloud Run Job
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.execute_job == 'true'
        run: |
          gcloud run jobs execute "$JOB_NAME" \
            --region "${{ vars.GCP_REGION }}" \
            --project "${{ vars.GCP_PROJECT_ID }}" \
            --wait